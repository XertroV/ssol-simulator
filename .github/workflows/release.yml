name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-master-tag:
    name: Verify tag is on master
    runs-on: ubuntu-latest
    outputs:
      on_master: ${{ steps.verify.outputs.on_master }}

    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit is contained in master
        id: verify
        shell: bash
        run: |
          git fetch origin master --depth=1
          if git branch -r --contains "$GITHUB_SHA" | grep -q "origin/master"; then
            echo "on_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on origin/master" >&2
            echo "on_master=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  build:
    name: ${{ matrix.name }}
    needs: verify-master-tag
    if: needs.verify-master-tag.outputs.on_master == 'true'
    runs-on: ${{ fromJson(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            runner: '"windows-latest"'
            target: x86_64-pc-windows-msvc
            binary: target/release/ssol_simulator.exe
          - name: Linux x86_64
            runner: '["self-hosted", "linux", "x64"]'
            target: x86_64-unknown-linux-gnu
            binary: target/release/ssol_simulator
          - name: macOS arm64
            runner: '"macos-14"'
            target: aarch64-apple-darwin
            binary: target/release/ssol_simulator

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked

      - name: Package archive
        shell: bash
        run: |
          python scripts/package_release.py \
            --target ${{ matrix.target }} \
            --version ${{ github.ref_name }} \
            --binary ${{ matrix.binary }} \
            --output-dir dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-bundle-*
          merge-multiple: true
          path: dist

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
